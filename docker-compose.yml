services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SQL_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_PASSWORD}\" -Q \"SELECT 1\" -No"]
      interval: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10
      start_period: 20s

  # ── API Gateway ────────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: services/Gateway/Finance.Gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
    depends_on:
      - identity-svc
      - portfolio-svc
      - marketdata-svc
      - alert-svc
      - sentiment-svc
      - notification-svc

  # ── Microservices (added phase by phase) ────────────────────────────────────

  # Phase 2 ✅
  identity-svc:
    build:
      context: .
      dockerfile: services/Identity/Finance.IdentityService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityDb: "Server=${SQL_SERVER},1433;Database=IdentityDB;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__DurationInMinutes: "${JWT_DURATION_MINUTES}"
    depends_on:
      sqlserver:
        condition: service_healthy

  # Phase 3 ✅
  sentiment-svc:
    build:
      context: .
      dockerfile: services/Sentiment/Finance.SentimentService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"

  # Phase 4 ✅
  marketdata-svc:
    build:
      context: .
      dockerfile: services/MarketData/Finance.MarketDataService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      RabbitMq__Host: "${RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USERNAME}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
      Hangfire__UseRedis: "true"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Phase 5 ✅
  portfolio-svc:
    build:
      context: .
      dockerfile: services/Portfolio/Finance.PortfolioService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__PortfolioDb: "Server=${SQL_SERVER},1433;Database=PortfolioDB;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__DurationInMinutes: "${JWT_DURATION_MINUTES}"
      MarketData__GrpcAddress: "http://marketdata-svc:8081"
      RabbitMq__Host: "${RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USERNAME}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      marketdata-svc:
        condition: service_started

  # Phase 6 ✅
  alert-svc:
    build:
      context: .
      dockerfile: services/Alert/Finance.AlertService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__AlertDb: "Server=${SQL_SERVER},1433;Database=AlertDB;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__DurationInMinutes: "${JWT_DURATION_MINUTES}"
      RabbitMq__Host: "${RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USERNAME}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Phase 7 ✅
  notification-svc:
    build:
      context: .
      dockerfile: services/Notification/Finance.NotificationService.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      JwtSettings__Key: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__DurationInMinutes: "${JWT_DURATION_MINUTES}"
      EmailSettings__ApiKey: "${SENDGRID_API_KEY}"
      EmailSettings__FromAddress: "${SENDGRID_FROM_ADDRESS}"
      EmailSettings__FromName: "${SENDGRID_FROM_NAME}"
      RabbitMq__Host: "${RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USERNAME}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../Finance.Portfolio.Web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  sqldata:
