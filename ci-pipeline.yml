trigger: none

pr:
  branches:
    include: [main]

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: CI — Build and Test
  jobs:
  - job: BuildAndTest
    displayName: Restore and Build all services
    steps:
    - task: DotNetCoreCLI@2
      displayName: Restore NuGet packages
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build all services
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--no-restore -c Release'