# Exposes individual service ports for direct debugging without going through gateway.
# Used in development only.

services:
  identity-svc:
    ports:
      - "5001:8080"

  sentiment-svc:
    ports:
      - "5005:8080"

  portfolio-svc:
    ports:
      - "5002:8080"

  marketdata-svc:
    ports:
      - "5003:8080"
      - "5013:8081"   # gRPC

  alert-svc:
    ports:
      - "5004:8080"

  notification-svc:
    ports:
      - "5006:8080"
